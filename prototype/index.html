<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil Explorador Táctil</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" />
  <!-- PapaParse for parsing CSV from Google Sheets -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>
<body>
  <div class="container">
    
    <!-- Profile Header -->
    <header class="profile-header">
      <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuDD5VkE-Y3nSw5dId62tLxTHxEtDWcQzRHZVowfg0j84cb2bWC7sAGNnGQzp4WZ9qJi9Ci-6SjM9_8B-vytJc4j8RqsL1fWdC7uQma7JG2QtilQCzrK6vHPtG_KycuDXWKeO9a7GNigQwAxbeb_5u40ObvjDQO7wIKKKKo8G4DRj4gd1l97rGsPpnKEpWzkIvOtHe8LoOKzJNDAZjj18-MwwrII9_iQH_rAFHAEfphvSsyVG2vnJ4ViA0iOMrx4gaxSesyzUNof0K0" alt="Banner" class="banner">
      <div class="profile-info">
        <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuAQIdShxeoJLVJecLza0pWd-VhZaxEj3k1jb4tTXHWwEU05vlzSvODMMm4vnvqXlvGq_8uY7nf1k_pFu5Zhf9sk9Sq-sjWbLM-5hn2qe_LmU2rPZMcsQ65ukb6RT4GuxC1lr0Sn0JxU5En7ZzaL93rOyPtLN6dvgYsRNmHAozJwPrZow80AWpS7MOikvoJmJw4xAt-HO4d4GJxaWA6JWr0rxn_52t7-4SlSJ-S4D_SNBOOUmnSYva4mVPZKIYymUGRvR7KMYRJ5MDw" alt="Avatar" class="avatar">
        <div class="user-details" id="user-header-details">
          <h1>Leo_Evergreen</h1>
          <p><span class="material-symbols-rounded">verified_user</span> Usuario seguro desde 2023</p>
        </div>
      </div>
    </header>

    <!-- Subtabs -->
    <div class="tabs">
      <button class="tab-btn active" data-target="posts">Publicaciones</button>
      <button class="tab-btn" data-target="information">Información</button>
      <button class="tab-btn" data-target="photos">Fotos</button>
    </div>

    <!-- Main Content Area -->
    <main>
      <!-- Posts Tab -->
      <div id="posts" class="tab-pane active">
        <div id="posts-container">
          <!-- Los posts se inyectarán aquí -->
          <p style="text-align:center; color: var(--text-muted); opacity:0.7;">Esperando el enlace de Google Sheets...</p>
        </div>
      </div>

      <!-- Information Tab -->
      <div id="information" class="tab-pane">
        <div class="info-card" id="profile-container">
          <!-- La información de perfil se inyectará aquí -->
          <p style="text-align:center; color: var(--text-muted); opacity:0.7;">Esperando el enlace de Google Sheets...</p>
        </div>
      </div>

      <!-- Photos Tab -->
      <div id="photos" class="tab-pane">
        <div class="photos-grid" id="photos-container">
          <!-- Las fotos se inyectarán aquí -->
        </div>
      </div>
    </main>
  </div>

  <!-- Chat System -->
  <aside class="chat-window">
    <div class="chat-header">
      <img src="https://i.pravatar.cc/150?u=a042581f4e29026704d" alt="Alex" class="avatar">
      <div class="chat-status">
        <h4>GamerAlex88</h4>
        <p><span class="status-dot"></span> En línea</p>
      </div>
    </div>
    
    <div class="chat-messages" id="chatMessages">
      <!-- Los mensajes se cargarán dinámicamente aquí -->
    </div>

    <div class="chat-input">
      <input type="text" placeholder="Escribe un mensaje..." readonly>
      <button><span class="material-symbols-rounded">send</span></button>
    </div>
  </aside>

  <!-- Photo Lightbox -->
  <div id="lightbox" class="lightbox">
    <button class="lightbox-close" id="closeLightbox"><span class="material-symbols-rounded">close</span></button>
    <button class="lightbox-nav prev" id="prevPhoto"><span class="material-symbols-rounded">chevron_left</span></button>
    <div class="lightbox-content">
      <img id="lightboxImg" src="" alt="Ampliada">
    </div>
    <button class="lightbox-nav next" id="nextPhoto"><span class="material-symbols-rounded">chevron_right</span></button>
  </div>

  <script src="app.js"></script>
</body>
</html>
